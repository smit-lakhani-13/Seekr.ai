steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/seekr-vision-api:$COMMIT_SHA', '.']
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/seekr-vision-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - seekr-vision-api
      - --image=gcr.io/$PROJECT_ID/seekr-vision-api:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - '--set-env-vars=VISION_PROVIDER=mock'

images:
  - 'gcr.io/$PROJECT_ID/seekr-vision-api:$COMMIT_SHA'
